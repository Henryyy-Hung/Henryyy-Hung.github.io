 <!DOCTYPE HTML>

<html lang="en">
	
	<head>
	
		<meta charset="utf-8">
		
		<title>2022-23 COMP3322B Assignment 3</title>
		
		<base target="_blank" />
		
		<meta name="author" content="Hung Ka Hing" />
		<meta name="uid" content="3035782750" />
		<meta name="description" content="Web app that retrieves and displays ‘real-time’ passenger flight information from Hong Kong Airport Open Data" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0">

		<link rel="stylesheet" type="text/css" href="style.css" />
		
		<script src="script.js" type="text/javascript"></script>

	</head>
	
	<body>
		
		<header id="title">
			<h1>Hong Kong International Airport<br />Flight Information</h1>
		</header>
		
		<div class="content">
			
			<h2 id="currentCalendarDate"></h2>
			
			<div id="switchPanel" class="switchPanel noselect">
				
				<p id="departureLabel">Departure</p>

				<label class="switch">
					<input type="checkbox" name="checkbox" disabled="disabled">
					<span class="slider"></span>
				</label>
				
				<p id="arrivalLabel">Arrival</p>
				<p>&ensp;&ensp;</p>
				
			</div>
			
			<h3 id="flightModeTitle">Departure Information</h3>
			<div>
				<div style="text-align: center">
					<button id="loadEarlyFlightButton">Load Early Flight</button>
				</div>
				
				<div id="previousFlightsContainer"></div>
				
				<div id="currentFlightsContainer"></div>
				
				<div id="comingFlightsContainer"></div>
								
				<div style="text-align: center">
					<button id="loadMoreFlightButton">Load More Flight</button>
				</div>
			</div>
			
		</div>
		
	</body>

</html>
